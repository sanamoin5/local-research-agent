version: "3.9"
services:
  local-research-agent:
    build: .
    container_name: local-research-agent
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      RECOMMENDED_MODEL: ${RECOMMENDED_MODEL:-llama3.1:8b}
      LRA_DB_PATH: /data/local_research_agent.db
    volumes:
      - lra_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  lra_data:
