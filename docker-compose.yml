services:
  ollama:
    image: ollama/ollama:latest
    container_name: lra-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  local-research-agent:
    build: .
    container_name: local-research-agent
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      RECOMMENDED_MODEL: ${RECOMMENDED_MODEL:-llama3.1:8b}
      LRA_DB_PATH: /data/local_research_agent.db
    volumes:
      - lra_data:/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lra_data:
  ollama_data:
